name: P3 CI

on:
  push:
    branches: [ main ]
    paths:
      - 'P3/**'
      - '.github/workflows/p3-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'P3/**'
      - '.github/workflows/p3-ci.yml'

jobs:
  backend:
    name: P3 Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: P3/backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: devlearn
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # build는 test 포함 — P3 컨텍스트 로드 테스트가 MySQL을 필요로 함
      - name: Build & Test
        run: ./gradlew build
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: devlearn
          DB_USERNAME: root
          DB_PASSWORD: root
          PORT: 8080
          JWT_SECRET_KEY: ci-dummy-secret-key-min-256-bits-for-build-check-only-1234567890
          # TOSS_SECRET_KEY 미설정 → 결제는 Mock 게이트웨이로 동작(테스트 그린)

  frontend:
    name: P3 Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: P3/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: P3/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
