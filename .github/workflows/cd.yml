name: P3 CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths:
      - 'P3/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # GHCR 푸시(GITHUB_TOKEN)

jobs:
  images:
    name: Build & Push P3 Images (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image metadata
        id: meta_be
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/p3-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: P3/backend
          file: P3/backend/Dockerfile
          push: true
          tags: ${{ steps.meta_be.outputs.tags }}
          labels: ${{ steps.meta_be.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend image metadata
        id: meta_fe
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/p3-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: P3/frontend
          file: P3/frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'http://localhost:8080/api' }}
            VITE_TOSS_CLIENT_KEY=${{ vars.VITE_TOSS_CLIENT_KEY || '' }}
          tags: ${{ steps.meta_fe.outputs.tags }}
          labels: ${{ steps.meta_fe.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2 (SSH pull)
    needs: images
    runs-on: ubuntu-latest
    # DEPLOY_ENABLED 변수가 'true'일 때만 실행. 미설정이면 skip(그린 유지).
    if: ${{ github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: SSH deploy (docker compose pull & up)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          password: ${{ secrets.EC2_PASSWORD }}
          script: |
            set -e
            cd ~/devlearn/P3
            git pull --ff-only || true
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export BACKEND_IMAGE=ghcr.io/${{ github.repository }}/p3-backend:latest
            export FRONTEND_IMAGE=ghcr.io/${{ github.repository }}/p3-frontend:latest
            docker compose pull
            docker compose up -d
            docker image prune -f
