spring.application.name=dev-learn
spring.config.import=optional:file:.env[.properties]

server.port=${PORT}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_SHOW_SQL:false}

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jwt.secret=${JWT_SECRET_KEY}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# 관리자 부트스트랩 계정 (ADMIN_PASSWORD 미설정 시 자동 생성 안 함)
app.admin.username=${ADMIN_USERNAME:admin01}
app.admin.password=${ADMIN_PASSWORD:}

# 알림(P3): 기본 채널 + Discord webhook + 디스패처 주기
app.notification.default-channel=${NOTIFICATION_CHANNEL:DISCORD}
app.notification.discord-webhook-url=${DISCORD_WEBHOOK_URL:}
app.notification.dispatch-interval-ms=${NOTIFICATION_DISPATCH_INTERVAL_MS:15000}

# 결제(P3): Toss Payments. 시크릿키 미설정 시 Mock 게이트웨이로 fallback.
app.payment.toss.secret-key=${TOSS_SECRET_KEY:}
app.payment.toss.client-key=${TOSS_CLIENT_KEY:}

springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.csrf.enabled=${SWAGGER_ENABLED:false}

# 관측성(P3): Actuator 헬스/메트릭 (운영 노출 엔드포인트 제한)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
info.app.name=DevLearn P3
info.app.phase=P3-operational

# 구조화 로그 패턴 (requestId MDC 포함)
logging.pattern.level=%5p [reqId=%X{requestId:-}]