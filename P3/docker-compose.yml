services:
  mysql:
    image: mysql:8.0
    container_name: devlearn-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    # 배포는 EC2에서 직접 빌드(docker compose up -d --build). 빌드 결과에 붙는 로컬 태그.
    image: devlearn-p3-backend:local
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devlearn-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin01}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      NOTIFICATION_CHANNEL: ${NOTIFICATION_CHANNEL:-DISCORD}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      NOTIFICATION_DISPATCH_INTERVAL_MS: ${NOTIFICATION_DISPATCH_INTERVAL_MS:-15000}
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY:-}
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m}
    ports:
      - "8080:8080"

  frontend:
    image: devlearn-p3-frontend:local
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_TOSS_CLIENT_KEY: ${VITE_TOSS_CLIENT_KEY:-}
    container_name: devlearn-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:4173"

volumes:
  mysql-data:
